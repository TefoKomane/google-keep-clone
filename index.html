<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Google Keep</h1>
        </header>
        <main>
            <div class="input-section">
                <input type="text" id="noteTitle" placeholder="Title">
                <textarea id="noteContent" placeholder="Take a note..."></textarea>
                <div class="color-picker">
                    <label>Color:</label>
                    <select id="noteColor">
                        <option value="white">White</option>
                        <option value="#FFE5B4">Peach</option>
                        <option value="#FFFACD">Yellow</option>
                        <option value="#E0F8E0">Green</option>
                        <option value="#E0F4FF">Blue</option>
                        <option value="#FFE4E1">Pink</option>
                    </select>
                </div>
                <button id="addBtn">Add Note</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
